name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & build client
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Install api deps
        run: npm ci

      - name: Api syntax check
        run: node --check api/index.js
