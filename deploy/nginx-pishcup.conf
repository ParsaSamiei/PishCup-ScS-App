# Place at /etc/nginx/sites-available/pishcup.yourdomain.com
# then: ln -s ../sites-available/pishcup.yourdomain.com /etc/nginx/sites-enabled/
# then: nginx -t && systemctl reload nginx
# then: certbot --nginx -d pishcup.yourdomain.com   (adds TLS, doesn't touch other sites)

server {
    listen 80;
    server_name pishcup.yourdomain.com;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
